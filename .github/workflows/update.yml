name: Update and Release

# See ./reusable-release.yml for required secrets

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "If the version is a major update or a minor update"
        required: true
        type: choice
        options:
          - major
          - minor

# Cancel any ongoing instances of this workflow
concurrency:
  group: update
  cancel-in-progress: true

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next-version.outputs.version }}
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          persist-credentials: false

      - name: "Get version number"
        id: next-version
        shell: bash
        env:
          IS_MAJOR: ${{ inputs.release-type == 'major' }}
        run: |
          old=`git describe --abbrev=0 --tags`
          IFS=. read -r unchanging major minor <<< "$old"

          # Specify base 10 in case of leading zeroes (octal)
          ((major=10#$major, minor=10#$minor))

          if [[ ${{ env.IS_MAJOR }} == 'true' ]]; then
            ((major++, minor=0))
          else
            ((minor++))
          fi

          new="$unchanging.$major.$minor"

          if [[ $old == $new ]]; then
            echo "failed to update the version number $old" && exit 1
          fi

          echo "version=$new" >> "$GITHUB_OUTPUT"

  call-workflow:
    permissions:
      contents: write # give the token the ability to write commits and releases to the repo

    needs: get-version
    uses: Divine-Journey-2/Divine-Journey-2/.github/workflows/reusable-release.yml@main
    with:
      version: ${{ needs.get-version.outputs.version }}
      update-version: true
      release-type: "release"
    secrets: inherit
